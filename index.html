<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            text-align: center; overflow-x: hidden;
        }
        #setup-container {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000; max-width: 400px; width: 90%;
        }
        #setup-container h2 {
            color: #d81b60; font-family: 'Dancing Script', cursive;
            font-size: 2rem; margin-bottom: 20px;
        }
        .upload-btn {
            background: #d81b60; color: white; padding: 12px 24px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            display: inline-block; transition: 0.3s;
        }
        #file-input { display: none; }
        #open-gift-btn {
            display: none; margin-top: 20px; background: #ff4081;
            color: white; padding: 15px 30px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
        #main-content { display: none; animation: fadeIn 2s ease-in; max-width: 500px; padding: 20px; }
        h1 { font-family: 'Dancing Script', cursive; color: #d81b60; font-size: 3.5rem; text-shadow: 2px 2px #fff; }
        .photo-frame {
            width: 280px; height: 280px; border: 10px solid white;
            border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 20px auto; overflow: hidden; transform: rotate(-3deg);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .message {
            font-size: 1.2rem; color: #555; line-height: 1.6;
            margin-top: 20px; background: rgba(255, 255, 255, 0.6);
            padding: 20px; border-radius: 15px;
        }
        .hearts { position: fixed; top: -10px; font-size: 20px; z-index: -1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="setup-container">
        <h2>Create Your Mother's Day Gift ❤️</h2>
        <p>Please upload a beautiful photo of your mother</p>
        <label for="file-input" class="upload-btn">Choose Photo 📷</label>
        <input type="file" id="file-input" accept="image/*">
        <button id="open-gift-btn">Open Your Gift 🎁</button>
    </div>

    <div id="main-content">
        <h1>Happy Mother's Day!</h1>
        <div class="photo-frame"><img src="" id="display-image"></div>
        <div class="message">
            <p>To the most wonderful woman in the world... <br> 
            Thank you for your endless love, patience, and strength. <br>
            <b>You are my world! ❤️</b></p>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="mumma.mp3" type="audio/mpeg">
    </audio>

    <script>
        const fileInput = document.getElementById('file-input');
        const openGiftBtn = document.getElementById('open-gift-btn');
        const setupContainer = document.getElementById('setup-container');
        const mainContent = document.getElementById('main-content');
        const displayImage = document.getElementById('display-image');
        const bgMusic = document.getElementById('bgMusic');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    displayImage.src = e.target.result;
                    openGiftBtn.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            }
        });

        openGiftBtn.addEventListener('click', function() {
            setupContainer.style.display = 'none';
            mainContent.style.display = 'block';
            
            // Force the audio to load and play
            bgMusic.load(); 
            bgMusic.play().then(() => {
                console.log("Playing audio successfully");
            }).catch(error => {
                alert("Music failed to play. Please make sure your song file is named exactly 'mumma.mp3' on GitHub!");
                console.error("Error:", error);
            });
            
            setInterval(createHeart, 300);
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('hearts');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; 
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
